<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex"/>
<title>Page not found — RyGar Labs</title>
<meta name="theme-color" content="#0a0a0c"/>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<link rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<link rel="preload" href="/assets/fonts/space-grotesk.woff2" as="font" type="font/woff2" crossorigin/>
<link rel="preload" href="/assets/fonts/jetbrains-mono.woff2" as="font" type="font/woff2" crossorigin/>
<style>
@font-face{font-family:'Space Grotesk';font-style:normal;font-weight:300 700;font-display:swap;src:url('/assets/fonts/space-grotesk.woff2') format('woff2')}
@font-face{font-family:'Inter';font-style:normal;font-weight:100 900;font-display:swap;src:url('/assets/fonts/inter.woff2') format('woff2')}
@font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:100 800;font-display:swap;src:url('/assets/fonts/jetbrains-mono.woff2') format('woff2')}
:root{
  --bg:#0a0a0c;--text:#ececf0;--text-2:#9b9ba6;--text-3:#7c7c88;
  --amber:#e3a14f;--line:#222229;
  --display:'Space Grotesk',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--body);line-height:1.65;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:32px;text-align:center;
  background-image:radial-gradient(ellipse at 50% 38%,rgba(24,72,108,.18),transparent 60%)}
a{color:inherit;text-decoration:none}
:focus-visible{outline:2px solid var(--amber);outline-offset:3px;border-radius:3px}
.eyebrow{font-family:var(--mono);font-size:12.5px;letter-spacing:.08em;color:var(--text-3);text-transform:lowercase;margin-bottom:22px}
.eyebrow b{color:var(--amber);font-weight:500}
.code{font-family:var(--display);font-weight:700;font-size:clamp(72px,18vw,140px);line-height:1;letter-spacing:-.02em}
.code span{color:var(--amber)}
h1{font-family:var(--display);font-weight:600;font-size:clamp(22px,4vw,30px);letter-spacing:-.015em;margin:18px 0 12px}
p{color:var(--text-2);max-width:46ch;margin:0 auto;font-size:16.5px}
.btn{display:inline-flex;align-items:center;gap:8px;margin-top:34px;font-family:var(--display);font-weight:600;
  font-size:15.5px;padding:14px 26px;border-radius:10px;background:var(--amber);color:#1b1206;
  transition:transform .15s ease,background .15s ease}
.btn:hover{transform:translateY(-1px);background:#eeb066}
.home{margin-top:22px;font-family:var(--mono);font-size:12.5px;color:var(--text-3)}
.home a{color:var(--text-2);border-bottom:1px solid var(--line)}
.home a:hover{color:var(--amber);border-color:var(--amber)}
</style>
</head>
<body>
<main>
  <p class="eyebrow">/ <b>404</b> — page not found</p>
  <div class="code">4<span>0</span>4</div>
  <h1>This page wandered off.</h1>
  <p>The link's broken or the page moved. Everything RyGar Labs does still lives one click away.</p>
  <a class="btn" href="/">Back to home →</a>
  <p class="home">rygarlabs.com · Bowling Green, KY</p>
</main>
</body>
</html>
